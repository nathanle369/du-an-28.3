netlify/functions/payment-webhook.js
// ============================================================
// Netlify Function: Nhận webhook SePay → Gửi email ebook
// ============================================================

// ── THAY 4 GIÁ TRỊ NÀY ──────────────────────────────────────
const CONFIG = {
  accountNumber: '0111000560086',        // ← Số TK Vietcombank của bạn
  minAmount:     79000,
  ebookUrl:      'https://drive.google.com/uc?export=download&id=1A-txjLodkaNkgMZtkpH94v9FEMsmzHM7',
  emailjs: {
    serviceId:  'service_8oosfox',    // ← Service ID EmailJS
    templateId: 'template_bs9crec',   // ← Template ID EmailJS
    publicKey:  'fTELs1_t0_1i1zoAx',   // ← Public Key EmailJS
  },
};
// ─────────────────────────────────────────────────────────────

// Lưu đơn hàng tạm trong RAM
const pendingOrders = new Map();

// Gửi email qua EmailJS REST API
async function sendEmail(toName, toEmail, orderId) {
  const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      service_id:  CONFIG.emailjs.serviceId,
      template_id: CONFIG.emailjs.templateId,
      user_id:     CONFIG.emailjs.publicKey,
      template_params: {
        to_name:      toName,
        to_email:     toEmail,
        order_id:     orderId,
        amount:       '79,000đ',
        download_url: CONFIG.ebookUrl,
      },
    }),
  });
  if (!res.ok) throw new Error(await res.text());
}

// Lưu đơn hàng mới (Sales Page gọi khi khách bấm thanh toán)
async function handleRegister(body) {
  const { orderId, customerName, customerEmail } = body;
  if (!orderId || !customerEmail) {
    return { statusCode: 400, body: 'Thiếu thông tin' };
  }
  pendingOrders.set(orderId, {
    name:  customerName || 'Quý khách',
    email: customerEmail,
    paid:  false,
  });
  console.log(`📋 Đơn lưu: ${orderId} → ${customerEmail}`);
  return { statusCode: 200, body: JSON.stringify({ ok: true }) };
}

// Nhận webhook từ SePay khi có tiền vào
async function handleSepay(body) {
  console.log('🔔 SePay webhook:', JSON.stringify(body));

  const { accountNumber, transferAmount, content = '', transferType } = body;

  // Bỏ qua giao dịch rút tiền
  if (transferType === 'out') return { statusCode: 200, body: 'ignored: out' };

  // Kiểm tra đúng số TK
  if (accountNumber !== CONFIG.accountNumber) {
    return { statusCode: 200, body: 'ignored: wrong account' };
  }

  // Kiểm tra đủ tiền
  if (transferAmount < CONFIG.minAmount) {
    return { statusCode: 200, body: 'ignored: low amount' };
  }

  // Trích mã ORDER từ nội dung chuyển khoản
  // Ví dụ nội dung: "ORDER-1774794462477-5801"
  const match = content.match(/ORDER-\d{13}-\d{4}/i);
  if (!match) {
    console.log(`⚠️ Không tìm thấy ORDER trong: "${content}"`);
    return { statusCode: 200, body: 'ignored: no order id' };
  }

  const orderId = match[0].toUpperCase();
  const order   = pendingOrders.get(orderId);

  if (!order) {
    console.log(`⚠️ Không tìm thấy đơn: ${orderId}`);
    return { statusCode: 200, body: 'order not found' };
  }

  if (order.paid) return { statusCode: 200, body: 'already sent' };

  // Đánh dấu đã xử lý
  order.paid = true;
  pendingOrders.set(orderId, order);

  // Gửi email
  try {
    await sendEmail(order.name, order.email, orderId);
    console.log(`📧 Email gửi → ${order.email}`);
    return { statusCode: 200, body: JSON.stringify({ ok: true }) };
  } catch (err) {
    console.error('❌ Lỗi email:', err.message);
    return { statusCode: 500, body: err.message };
  }
}

// Handler chính
exports.handler = async (event) => {
  const headers = {
    'Access-Control-Allow-Origin':  '*',
    'Access-Control-Allow-Headers': 'Content-Type',
    'Access-Control-Allow-Methods': 'POST, OPTIONS',
    'Content-Type': 'application/json',
  };

  if (event.httpMethod === 'OPTIONS') return { statusCode: 200, headers, body: '' };
  if (event.httpMethod !== 'POST')    return { statusCode: 405, headers, body: 'Method Not Allowed' };

  let body;
  try { body = JSON.parse(event.body || '{}'); }
  catch { return { statusCode: 400, headers, body: 'Invalid JSON' }; }

  const action = (event.queryStringParameters || {}).action || 'sepay';
  const result = action === 'register'
    ? await handleRegister(body)
    : await handleSepay(body);

  return { ...result, headers };
};
